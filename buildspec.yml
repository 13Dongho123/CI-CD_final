version: 0.2

env:
  variables:
    AWS_DEFAULT_REGION: eu-central-1
    REPOSITORY_URI: <ECR_URI>

phases:
  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      - aws ecr get-login-password --region eu-central-1 \
        | docker login --username AWS --password-stdin 354493396671.dkr.ecr.eu-central-1.amazonaws.com

  build:
    commands:
      - echo Building Docker image...
      - docker build -t app .
      - docker tag app:latest $REPOSITORY_URI:latest

  post_build:
    commands:
      - echo Pushing image to ECR...
      - docker push $REPOSITORY_URI:latest
      - printf '[{"name":"app-container","imageUri":"%s"}]' $REPOSITORY_URI:latest > imagedefinitions.json

artifacts:
  files:
    - imagedefinitions.json